<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Goodreads Feed</title>
<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 20px;
  background: #ffffff;
}

.container {
  max-width: 320px;
  border: 2px solid #7a4a1e;
  border-radius: 8px;
  padding: 12px;
}

h2 {
  font-size: 16px;
  margin: 0 0 10px 0;
}

.item {
  font-size: 13px;
  margin-bottom: 10px;
  line-height: 1.4;
  border-bottom: 1px solid #eee;
  padding-bottom: 8px;
}
</style>
</head>

<body>
<div class="container">
  <h2>📚 Goodreads Updates</h2>
  <div id="feed">Loading…</div>
</div>

<script>
const feedUrl = "https://www.goodreads.com/user/updates_rss/180510525";

fetch("https://api.rss2json.com/v1/api.json?rss_url=" + encodeURIComponent(feedUrl))
  .then(res => res.json())
  .then(data => {
    const container = document.getElementById("feed");
    container.innerHTML = "";

    data.items.slice(0, 5).forEach(item => {
      const div = document.createElement("div");
      div.className = "item";
      div.innerHTML = `<strong>${item.title}</strong><br>${item.pubDate}`;
      container.appendChild(div);
    });
  })
  .catch(() => {
    document.getElementById("feed").innerText = "Unable to load feed.";
  });
</script>
</body>
</html>
